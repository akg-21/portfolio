
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--neon:#00ffe7;--neon2:#7b2fff;--neon3:#ff2d78;--bg:#050b12;--bg2:#0a1220;--border:#0e2540;--text:#c8dff5;--muted:#4a6a8a}
  body{background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);overflow:hidden}
  .container{position:relative;width:100%;height:520px;overflow:hidden}
  canvas#particles{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}

  .content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:2rem;padding:2rem}

  /* GLITCH */
  .glitch-wrap{text-align:center}
  .glitch{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:700;color:#fff;position:relative;cursor:pointer;display:inline-block;letter-spacing:2px}
  .glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
  .glitch::before{color:var(--neon);clip-path:polygon(0 0,100% 0,100% 35%,0 35%);animation:none}
  .glitch::after{color:var(--neon3);clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);animation:none}
  .glitch.glitching::before{animation:glitch-top .15s steps(2) 3}
  .glitch.glitching::after{animation:glitch-bot .15s steps(2) 3}
  .glitch.glitching{animation:glitch-main .15s steps(2) 3}
  @keyframes glitch-main{0%,100%{transform:none}25%{transform:skewX(-2deg) translateX(3px)}75%{transform:skewX(2deg) translateX(-3px)}}
  @keyframes glitch-top{0%,100%{transform:none;opacity:1}25%{transform:translateX(-4px);opacity:.8}75%{transform:translateX(4px);opacity:.8}}
  @keyframes glitch-bot{0%,100%{transform:none;opacity:1}25%{transform:translateX(4px);opacity:.8}75%{transform:translateX(-4px);opacity:.8}}
  .hint{font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:.4rem}

  /* MAGNETIC BUTTONS */
  .btns-row{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}
  .mag-btn{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;padding:10px 28px;border-radius:2px;cursor:pointer;transition:box-shadow .2s;display:inline-block;position:relative;user-select:none}
  .mag-btn-primary{background:var(--neon);color:#050b12;border:none;font-weight:700}
  .mag-btn-ghost{background:transparent;color:var(--neon);border:1px solid var(--neon)}

  /* SPOTLIGHT CARD */
  .card-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
  .spotlight-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1.2rem 1.5rem;width:200px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .3s}
  .spotlight-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none;border-radius:4px}
  .spotlight-card:hover{border-color:rgba(0,255,231,.4)}
  .card-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:6px}
  .card-sub{font-size:10px;color:var(--muted);line-height:1.7}

  .section-label{font-size:9px;letter-spacing:3px;color:var(--neon);margin-bottom:.3rem}
</style>

<div class="container" id="main">
  <canvas id="particles"></canvas>
  <div class="content">

    <div class="glitch-wrap">
      <div class="section-label">// EFFECT 1 — HOVER THE NAME</div>
      <div class="glitch" id="glitch-name" data-text="AJAYKRISHNAN G">AJAYKRISHNAN G</div>
      <div class="hint">hover to glitch</div>
    </div>

    <div>
      <div class="section-label" style="text-align:center;margin-bottom:.8rem">// EFFECT 2 — MAGNETIC BUTTONS</div>
      <div class="btns-row">
        <button class="mag-btn mag-btn-primary" id="btn1">$ contact --me</button>
        <button class="mag-btn mag-btn-ghost" id="btn2">$ view --work</button>
      </div>
      <div class="hint" style="text-align:center;margin-top:.4rem">move mouse near buttons</div>
    </div>

    <div>
      <div class="section-label" style="text-align:center;margin-bottom:.8rem">// EFFECT 3 — SPOTLIGHT CARDS</div>
      <div class="card-row">
        <div class="spotlight-card" id="card1">
          <div class="card-title">Green Track</div>
          <div class="card-sub">Waste management with predictive analytics</div>
        </div>
        <div class="spotlight-card" id="card2">
          <div class="card-title">Get Your Services</div>
          <div class="card-sub">Real-time emergency location app</div>
        </div>
      </div>
      <div class="hint" style="text-align:center;margin-top:.4rem">move mouse over cards</div>
    </div>

  </div>
</div>

<script>
/* PARTICLE BACKGROUND */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles=[], mouse={x:-999,y:-999};

function resize(){
  const cont = document.getElementById('main');
  W = canvas.width = cont.offsetWidth;
  H = canvas.height = cont.offsetHeight;
}
resize();

function Particle(){
  this.x = Math.random()*W;
  this.y = Math.random()*H;
  this.vx = (Math.random()-.5)*.4;
  this.vy = (Math.random()-.5)*.4;
  this.r = Math.random()*2+1;
}
for(let i=0;i<80;i++) particles.push(new Particle());

function drawParticles(){
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,231,0.6)';
    ctx.fill();
  });
  particles.forEach((a,i)=>{
    particles.slice(i+1).forEach(b=>{
      const dx=a.x-b.x, dy=a.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(0,255,231,${(1-dist/100)*.15})`;
        ctx.lineWidth=.5;
        ctx.stroke();
      }
      const mx=a.x-mouse.x, my=a.y-mouse.y;
      const md=Math.sqrt(mx*mx+my*my);
      if(md<150){
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.strokeStyle=`rgba(0,255,231,${(1-md/150)*.35})`;
        ctx.lineWidth=.6;
        ctx.stroke();
      }
    });
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

document.getElementById('main').addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left;
  mouse.y=e.clientY-r.top;
});
document.getElementById('main').addEventListener('mouseleave',()=>{mouse.x=-999;mouse.y=-999});

/* GLITCH EFFECT */
const glitchEl = document.getElementById('glitch-name');
glitchEl.addEventListener('mouseenter',()=>{
  glitchEl.classList.add('glitching');
  setTimeout(()=>glitchEl.classList.remove('glitching'),500);
});
setInterval(()=>{
  glitchEl.classList.add('glitching');
  setTimeout(()=>glitchEl.classList.remove('glitching'),500);
},3500);

/* MAGNETIC BUTTONS */
function magnetize(btn){
  btn.addEventListener('mousemove',e=>{
    const r=btn.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const dx=e.clientX-cx, dy=e.clientY-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const pull=Math.max(0,1-dist/80);
    btn.style.transform=`translate(${dx*pull*.4}px,${dy*pull*.4}px)`;
    btn.style.boxShadow=pull>0.1?`0 0 ${20*pull}px rgba(0,255,231,${pull*.6})`:'none';
  });
  btn.addEventListener('mouseleave',()=>{
    btn.style.transform='translate(0,0)';
    btn.style.boxShadow='none';
  });
}
magnetize(document.getElementById('btn1'));
magnetize(document.getElementById('btn2'));

/* SPOTLIGHT CARD */
function spotlight(card){
  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    const x=e.clientX-r.left, y=e.clientY-r.top;
    card.style.setProperty('--sx',x+'px');
    card.style.setProperty('--sy',y+'px');
    card.style.background=`radial-gradient(circle 80px at ${x}px ${y}px, rgba(0,255,231,0.07), #0a1220 60%)`;
  });
  card.addEventListener('mouseleave',()=>{
    card.style.background='var(--bg2)';
  });
}
spotlight(document.getElementById('card1'));
spotlight(document.getElementById('card2'));
</script>
