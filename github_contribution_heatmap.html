<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  :root {
    --neon: #00ffe7;
    --neon2: #7b2fff;
    --bg: #050b12;
    --bg2: #0a1220;
    --bg3: #0d1a2e;
    --text: #c8dff5;
    --muted: #4a6a8a;
    --border: #0e2540;
  }

  body {
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace, sans-serif;
    color: var(--text)
  }

  .wrap {
    padding: 2rem 1.5rem;
    background: var(--bg)
  }

  .sec-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem
  }

  .sec-num {
    font-size: 10px;
    color: var(--neon);
    letter-spacing: 2px
  }

  .sec-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px
  }

  .sec-line {
    flex: 1;
    height: 1px;
    background: var(--border)
  }

  .profile-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding: 1.5rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--neon)
  }

  .profile-info h2 {
    font-size: 1rem;
    color: #fff;
    margin-bottom: 4px
  }

  .profile-info p {
    font-size: 12px;
    color: var(--muted)
  }

  .profile-info .handle {
    color: var(--neon);
    font-size: 13px;
    margin-bottom: 6px
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem
  }

  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 1rem;
    border-radius: 4px;
    text-align: center;
    transition: border-color .3s
  }

  .stat:hover {
    border-color: var(--neon)
  }

  .stat-n {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--neon)
  }

  .stat-l {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px
  }

  .heatmap-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 2rem
  }

  .heatmap-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem
  }

  .heatmap-title {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 1px
  }

  .contrib-count {
    font-size: 12px;
    color: var(--neon)
  }

  .months-row {
    display: flex;
    gap: 2px;
    margin-bottom: 4px;
    padding-left: 28px
  }

  .month-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    flex: 1;
    text-align: center
  }

  .heatmap-body {
    display: flex;
    gap: 4px
  }

  .day-labels {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-right: 4px
  }

  .day-label {
    font-size: 9px;
    color: var(--muted);
    height: 13px;
    display: flex;
    align-items: center
  }

  .weeks {
    display: flex;
    gap: 2px;
    flex: 1
  }

  .week {
    display: flex;
    flex-direction: column;
    gap: 2px
  }

  .day-cell {
    width: 13px;
    height: 13px;
    border-radius: 2px;
    cursor: pointer;
    transition: transform .15s
  }

  .day-cell:hover {
    transform: scale(1.3)
  }

  .l0 {
    background: #0d1a2e
  }

  .l1 {
    background: #003d2e
  }

  .l2 {
    background: #006d52
  }

  .l3 {
    background: #00a87a
  }

  .l4 {
    background: #00ffe7
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 1rem;
    justify-content: flex-end
  }

  .legend-label {
    font-size: 10px;
    color: var(--muted)
  }

  .legend-cell {
    width: 12px;
    height: 12px;
    border-radius: 2px
  }

  .tooltip {
    position: absolute;
    background: #0d1a2e;
    border: 1px solid var(--neon);
    color: var(--text);
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 3px;
    pointer-events: none;
    display: none;
    z-index: 99;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace
  }

  .repos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem
  }

  .repo-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    transition: border-color .3s;
    cursor: pointer
  }

  .repo-card:hover {
    border-color: var(--neon2)
  }

  .repo-name {
    font-size: 13px;
    color: var(--neon);
    font-weight: 700;
    margin-bottom: 6px
  }

  .repo-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 10px;
    min-height: 36px
  }

  .repo-meta {
    display: flex;
    gap: 1rem;
    font-size: 10px;
    color: var(--muted)
  }

  .repo-lang {
    display: flex;
    align-items: center;
    gap: 5px
  }

  .lang-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--neon)
  }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 13px
  }

  .loading-dots::after {
    content: '...';
    animation: dots 1.2s infinite
  }

  @keyframes dots {
    0% {
      content: '.'
    }

    40% {
      content: '..'
    }

    80% {
      content: '...'
    }
  }

  .error-msg {
    background: rgba(255, 45, 45, .1);
    border: 1px solid #ff2d2d;
    color: #ff8080;
    padding: 1rem 1.5rem;
    border-radius: 4px;
    font-size: 12px;
    margin-bottom: 1rem
  }
</style>

<div class="wrap" id="root">
  <div class="sec-header">
    <div class="sec-num">05</div>
    <div class="sec-title">// GITHUB ACTIVITY</div>
    <div class="sec-line"></div>
  </div>
  <div class="loading" id="loading"><span class="loading-dots">Fetching GitHub data</span></div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
  const TOKEN = '1222222322222222222';
  const USERNAME = 'akg-21';

  async function fetchGitHub() {
    const root = document.getElementById('root');
    const loading = document.getElementById('loading');

    try {
      const userRes = await fetch('https://api.github.com/users/' + USERNAME, {
        headers: { Authorization: 'token ' + TOKEN }
      });
      const user = await userRes.json();

      const reposRes = await fetch('https://api.github.com/users/' + USERNAME + '/repos?per_page=6&sort=updated', {
        headers: { Authorization: 'token ' + TOKEN }
      });
      const repos = await reposRes.json();

      const contribRes = await fetch('https://api.github.com/graphql', {
        method: 'POST',
        headers: { Authorization: 'bearer ' + TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: `{
        user(login:"${USERNAME}"){
          contributionsCollection{
            contributionCalendar{
              totalContributions
              weeks{
                contributionDays{
                  contributionCount
                  date
                }
              }
            }
          }
        }
      }`})
      });
      const contribData = await contribRes.json();
      const calendar = contribData.data.user.contributionsCollection.contributionCalendar;

      loading.remove();
      renderAll(user, repos, calendar, root);
    } catch (e) {
      loading.innerHTML = '<div class="error-msg">Could not load GitHub data. Token may have expired or lacks permissions.</div>';
    }
  }

  function renderAll(user, repos, calendar, root) {
    const totalContribs = calendar.totalContributions;
    const weeks = calendar.weeks;

    const profileHTML = `
    <div class="profile-row">
      <img class="avatar" src="${user.avatar_url}" alt="${user.login}">
      <div class="profile-info">
        <div class="handle">@${user.login}</div>
        <h2>${user.name || user.login}</h2>
        <p>${user.bio || 'Backend Developer & Data Science Enthusiast'}</p>
      </div>
    </div>`;

    const statsHTML = `
    <div class="stats-row">
      <div class="stat"><div class="stat-n">${user.public_repos || 0}</div><div class="stat-l">REPOS</div></div>
      <div class="stat"><div class="stat-n">${user.followers || 0}</div><div class="stat-l">FOLLOWERS</div></div>
      <div class="stat"><div class="stat-n">${user.following || 0}</div><div class="stat-l">FOLLOWING</div></div>
      <div class="stat"><div class="stat-n">${totalContribs}</div><div class="stat-l">CONTRIBUTIONS</div></div>
    </div>`;

    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const monthsRow = buildMonthLabels(weeks);

    let weeksHTML = '';
    weeks.forEach(week => {
      let days = '';
      week.contributionDays.forEach(day => {
        const lvl = day.contributionCount === 0 ? 0 : day.contributionCount < 3 ? 1 : day.contributionCount < 6 ? 2 : day.contributionCount < 10 ? 3 : 4;
        const dt = new Date(day.date);
        const label = `${day.contributionCount} contribution${day.contributionCount !== 1 ? 's' : ''} on ${monthNames[dt.getMonth()]} ${dt.getDate()}`;
        days += `<div class="day-cell l${lvl}" data-tip="${label}"></div>`;
      });
      weeksHTML += `<div class="week">${days}</div>`;
    });

    const heatmapHTML = `
    <div class="heatmap-card">
      <div class="heatmap-header">
        <div class="heatmap-title">Contribution activity — last 12 months</div>
        <div class="contrib-count">${totalContribs} total</div>
      </div>
      <div class="months-row">${monthsRow}</div>
      <div class="heatmap-body">
        <div class="day-labels">
          <div class="day-label" style="height:13px"></div>
          <div class="day-label">Mon</div>
          <div class="day-label" style="height:13px"></div>
          <div class="day-label">Wed</div>
          <div class="day-label" style="height:13px"></div>
          <div class="day-label">Fri</div>
          <div class="day-label" style="height:13px"></div>
        </div>
        <div class="weeks">${weeksHTML}</div>
      </div>
      <div class="legend">
        <span class="legend-label">Less</span>
        <div class="legend-cell l0"></div>
        <div class="legend-cell l1"></div>
        <div class="legend-cell l2"></div>
        <div class="legend-cell l3"></div>
        <div class="legend-cell l4"></div>
        <span class="legend-label">More</span>
      </div>
    </div>`;

    let reposHTML = '<div class="repos-grid">';
    const langColors = { JavaScript: '#f1e05a', PHP: '#4F5D95', Python: '#3572A5', HTML: '#e34c26', CSS: '#563d7c', TypeScript: '#2b7489', Java: '#b07219', default: '#00ffe7' };
    (Array.isArray(repos) ? repos : []).slice(0, 6).forEach(r => {
      const lc = langColors[r.language] || langColors.default;
      reposHTML += `
      <div class="repo-card" onclick="openLink('${r.html_url}')">
        <div class="repo-name"><i class="ti ti-brand-github" style="font-size:14px;margin-right:6px" aria-hidden="true"></i>${r.name}</div>
        <div class="repo-desc">${r.description || 'No description provided.'}</div>
        <div class="repo-meta">
          <div class="repo-lang"><div class="lang-dot" style="background:${lc}"></div>${r.language || 'Unknown'}</div>
          <div><i class="ti ti-star" style="font-size:12px;margin-right:3px" aria-hidden="true"></i>${r.stargazers_count || 0}</div>
          <div><i class="ti ti-git-fork" style="font-size:12px;margin-right:3px" aria-hidden="true"></i>${r.forks_count || 0}</div>
        </div>
      </div>`;
    });
    reposHTML += '</div>';

    root.innerHTML = `
    <div class="sec-header">
      <div class="sec-num">05</div>
      <div class="sec-title">// GITHUB ACTIVITY</div>
      <div class="sec-line"></div>
    </div>
    ${profileHTML}${statsHTML}${heatmapHTML}
    <div class="sec-header" style="margin-top:2rem">
      <div class="sec-num"></div>
      <div class="sec-title" style="font-size:.9rem">// RECENT REPOS</div>
      <div class="sec-line"></div>
    </div>
    ${reposHTML}`;

    document.querySelectorAll('.day-cell').forEach(cell => {
      cell.addEventListener('mousemove', e => {
        const tip = document.getElementById('tooltip');
        tip.textContent = cell.dataset.tip;
        tip.style.display = 'block';
        tip.style.left = (e.pageX + 12) + 'px';
        tip.style.top = (e.pageY - 28) + 'px';
      });
      cell.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').style.display = 'none';
      });
    });
  }

  function buildMonthLabels(weeks) {
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    let labels = '';
    let lastMonth = -1;
    weeks.forEach(week => {
      if (week.contributionDays.length > 0) {
        const m = new Date(week.contributionDays[0].date).getMonth();
        if (m !== lastMonth) { labels += `<div class="month-label">${monthNames[m]}</div>`; lastMonth = m; }
        else labels += '<div class="month-label"></div>';
      }
    });
    return labels;
  }

  fetchGitHub();
</script>
