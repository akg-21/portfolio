<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  :root {
    --neon: #00ffe7;
    --neon2: #7b2fff;
    --bg: #050b12;
    --bg2: #0a1220;
    --bg3: #0d1a2e;
    --text: #c8dff5;
    --muted: #4a6a8a;
    --border: #0e2540
  }

  body {
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace, sans-serif;
    color: var(--text)
  }

  .wrap {
    padding: 2rem 1.5rem;
    background: var(--bg)
  }

  .sec-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem
  }

  .sec-num {
    font-size: 10px;
    color: var(--neon);
    letter-spacing: 2px
  }

  .sec-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px
  }

  .sec-line {
    flex: 1;
    height: 1px;
    background: var(--border)
  }

  .profile-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding: 1.5rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--neon)
  }

  .profile-info .handle {
    color: var(--neon);
    font-size: 13px;
    margin-bottom: 6px
  }

  .profile-info h2 {
    font-size: 1rem;
    color: #fff;
    margin-bottom: 4px
  }

  .profile-info p {
    font-size: 12px;
    color: var(--muted)
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem
  }

  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 1rem;
    border-radius: 4px;
    text-align: center;
    transition: border-color .3s
  }

  .stat:hover {
    border-color: var(--neon)
  }

  .stat-n {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--neon)
  }

  .stat-l {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px
  }

  .heatmap-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 2rem
  }

  .heatmap-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    gap: .8rem
  }

  .heatmap-title {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 1px
  }

  .contrib-count {
    font-size: 12px;
    color: var(--neon)
  }

  .year-tabs {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap
  }

  .year-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 1px
  }

  .year-btn:hover {
    border-color: var(--neon);
    color: var(--neon)
  }

  .year-btn.active {
    border-color: var(--neon);
    background: rgba(0, 255, 231, .1);
    color: var(--neon);
    box-shadow: 0 0 8px rgba(0, 255, 231, .2)
  }

  .months-row {
    display: flex;
    gap: 2px;
    margin-bottom: 4px;
    padding-left: 28px
  }

  .month-label {
    font-size: 9px;
    color: var(--muted);
    flex: 1;
    text-align: center
  }

  .heatmap-body {
    display: flex;
    gap: 4px
  }

  .day-labels {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-right: 4px
  }

  .day-label {
    font-size: 9px;
    color: var(--muted);
    height: 13px;
    display: flex;
    align-items: center
  }

  .weeks {
    display: flex;
    gap: 2px;
    flex: 1
  }

  .week {
    display: flex;
    flex-direction: column;
    gap: 2px
  }

  .day-cell {
    width: 13px;
    height: 13px;
    border-radius: 2px;
    cursor: pointer;
    transition: transform .15s
  }

  .day-cell:hover {
    transform: scale(1.3)
  }

  .l0 {
    background: #0d1a2e
  }

  .l1 {
    background: #003d2e
  }

  .l2 {
    background: #006d52
  }

  .l3 {
    background: #00a87a
  }

  .l4 {
    background: #00ffe7
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 1rem;
    justify-content: flex-end
  }

  .legend-label {
    font-size: 10px;
    color: var(--muted)
  }

  .legend-cell {
    width: 12px;
    height: 12px;
    border-radius: 2px
  }

  .tooltip {
    position: absolute;
    background: #0d1a2e;
    border: 1px solid var(--neon);
    color: var(--text);
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 3px;
    pointer-events: none;
    display: none;
    z-index: 99;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace
  }

  .repos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem
  }

  .repo-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    transition: border-color .3s;
    cursor: pointer
  }

  .repo-card:hover {
    border-color: var(--neon2)
  }

  .repo-name {
    font-size: 13px;
    color: var(--neon);
    font-weight: 700;
    margin-bottom: 6px
  }

  .repo-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 10px;
    min-height: 36px
  }

  .repo-meta {
    display: flex;
    gap: 1rem;
    font-size: 10px;
    color: var(--muted);
    align-items: center
  }

  .lang-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px
  }

  .loading-inline {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 12px
  }

  .loading-dots::after {
    content: '...';
    animation: dots 1.2s infinite
  }

  @keyframes dots {
    0% {
      content: '.'
    }

    40% {
      content: '..'
    }

    80% {
      content: '...'
    }
  }

  .error-msg {
    background: rgba(255, 45, 45, .1);
    border: 1px solid #ff2d2d;
    color: #ff8080;
    padding: 1rem;
    border-radius: 4px;
    font-size: 12px
  }

  .fade-in {
    animation: fadeIn .4s ease
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(8px)
    }

    to {
      opacity: 1;
      transform: none
    }
  }
</style>

<div class="wrap" id="root">
  <div class="sec-header">
    <div class="sec-num">05</div>
    <div class="sec-title">// GITHUB ACTIVITY</div>
    <div class="sec-line"></div>
  </div>
  <div class="loading-inline"><span class="loading-dots">Connecting to GitHub</span></div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
  const TOKEN = '123456789';
  const USERNAME = 'akg-21';
  const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const langColors = { JavaScript: '#f1e05a', PHP: '#4F5D95', Python: '#3572A5', HTML: '#e34c26', CSS: '#563d7c', TypeScript: '#2b7489', Java: '#b07219' };

  let userData = null;
  let reposData = null;
  let contribCache = {};
  const currentYear = new Date().getFullYear();
  const years = [currentYear, currentYear - 1, currentYear - 2, currentYear - 3];

  async function fetchUser() {
    const [uRes, rRes] = await Promise.all([
      fetch('https://api.github.com/users/' + USERNAME, { headers: { Authorization: 'token ' + TOKEN } }),
      fetch('https://api.github.com/users/' + USERNAME + '/repos?per_page=6&sort=updated', { headers: { Authorization: 'token ' + TOKEN } })
    ]);
    userData = await uRes.json();
    reposData = await rRes.json();
  }

  async function fetchContribs(year) {
    if (contribCache[year]) return contribCache[year];
    const from = year + '-01-01T00:00:00Z';
    const to = year + '-12-31T23:59:59Z';
    const res = await fetch('https://api.github.com/graphql', {
      method: 'POST',
      headers: { Authorization: 'bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: `{user(login:"${USERNAME}"){contributionsCollection(from:"${from}",to:"${to}"){contributionCalendar{totalContributions weeks{contributionDays{contributionCount date}}}}}}` })
    });
    const data = await res.json();
    const cal = data.data.user.contributionsCollection.contributionCalendar;
    contribCache[year] = cal;
    return cal;
  }

  function buildMonthLabels(weeks) {
    let labels = '', lastMonth = -1;
    weeks.forEach(week => {
      if (week.contributionDays.length > 0) {
        const m = new Date(week.contributionDays[0].date).getMonth();
        labels += `<div class="month-label">${m !== lastMonth ? MONTHS[m] : ''}</div>`;
        lastMonth = m;
      }
    });
    return labels;
  }

  function buildHeatmap(calendar, year) {
    const total = calendar.totalContributions;
    const weeks = calendar.weeks;
    let weeksHTML = '';
    weeks.forEach(week => {
      let days = '';
      week.contributionDays.forEach(day => {
        const c = day.contributionCount;
        const lvl = c === 0 ? 0 : c < 3 ? 1 : c < 6 ? 2 : c < 10 ? 3 : 4;
        const dt = new Date(day.date);
        const lbl = `${c} contribution${c !== 1 ? 's' : ''} on ${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${year}`;
        days += `<div class="day-cell l${lvl}" data-tip="${lbl}"></div>`;
      });
      weeksHTML += `<div class="week">${days}</div>`;
    });

    const yearTabsHTML = years.map(y =>
      `<button class="year-btn${y === year ? ' active' : ''}" onclick="switchYear(${y})">${y}</button>`
    ).join('');

    return `
    <div class="heatmap-card fade-in" id="heatmap-card">
      <div class="heatmap-top">
        <div>
          <div class="heatmap-title">Contribution activity</div>
          <div class="contrib-count" id="contrib-count">${total} contributions in ${year}</div>
        </div>
        <div class="year-tabs">${yearTabsHTML}</div>
      </div>
      <div class="months-row" id="months-row">${buildMonthLabels(weeks)}</div>
      <div class="heatmap-body">
        <div class="day-labels">
          <div class="day-label" style="height:13px"></div>
          <div class="day-label">Mon</div>
          <div class="day-label" style="height:13px"></div>
          <div class="day-label">Wed</div>
          <div class="day-label" style="height:13px"></div>
          <div class="day-label">Fri</div>
          <div class="day-label" style="height:13px"></div>
        </div>
        <div class="weeks" id="weeks-grid">${weeksHTML}</div>
      </div>
      <div class="legend">
        <span class="legend-label">Less</span>
        <div class="legend-cell l0"></div><div class="legend-cell l1"></div><div class="legend-cell l2"></div><div class="legend-cell l3"></div><div class="legend-cell l4"></div>
        <span class="legend-label">More</span>
      </div>
    </div>`;
  }

  async function switchYear(year) {
    document.querySelectorAll('.year-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.textContent) === year);
    });
    const grid = document.getElementById('weeks-grid');
    const countEl = document.getElementById('contrib-count');
    const monthsEl = document.getElementById('months-row');
    grid.innerHTML = `<div class="loading-inline" style="width:100%"><span class="loading-dots">Loading ${year}</span></div>`;
    const cal = await fetchContribs(year);
    countEl.textContent = `${cal.totalContributions} contributions in ${year}`;
    monthsEl.innerHTML = buildMonthLabels(cal.weeks);
    let weeksHTML = '';
    cal.weeks.forEach(week => {
      let days = '';
      week.contributionDays.forEach(day => {
        const c = day.contributionCount;
        const lvl = c === 0 ? 0 : c < 3 ? 1 : c < 6 ? 2 : c < 10 ? 3 : 4;
        const dt = new Date(day.date);
        const lbl = `${c} contribution${c !== 1 ? 's' : ''} on ${MONTHS[dt.getMonth()]} ${dt.getDate()}, ${year}`;
        days += `<div class="day-cell l${lvl}" data-tip="${lbl}"></div>`;
      });
      weeksHTML += `<div class="week">${days}</div>`;
    });
    grid.innerHTML = weeksHTML;
    attachTooltips();
  }

  function attachTooltips() {
    document.querySelectorAll('.day-cell').forEach(cell => {
      cell.addEventListener('mousemove', e => {
        const tip = document.getElementById('tooltip');
        tip.textContent = cell.dataset.tip;
        tip.style.display = 'block';
        tip.style.left = (e.pageX + 12) + 'px';
        tip.style.top = (e.pageY - 28) + 'px';
      });
      cell.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display = 'none' });
    });
  }

  async function init() {
    const root = document.getElementById('root');
    try {
      await fetchUser();
      const cal = await fetchContribs(currentYear);

      const langC = langColors;
      let reposHTML = '<div class="repos-grid">';
      (Array.isArray(reposData) ? reposData : []).slice(0, 6).forEach(r => {
        const lc = langC[r.language] || '#00ffe7';
        reposHTML += `<div class="repo-card" onclick="openLink('${r.html_url}')">
        <div class="repo-name"><i class="ti ti-brand-github" style="font-size:14px;margin-right:6px" aria-hidden="true"></i>${r.name}</div>
        <div class="repo-desc">${r.description || 'No description provided.'}</div>
        <div class="repo-meta">
          <span><span class="lang-dot" style="background:${lc}"></span>${r.language || 'Unknown'}</span>
          <span><i class="ti ti-star" style="font-size:12px;margin-right:2px" aria-hidden="true"></i>${r.stargazers_count || 0}</span>
          <span><i class="ti ti-git-fork" style="font-size:12px;margin-right:2px" aria-hidden="true"></i>${r.forks_count || 0}</span>
        </div>
      </div>`;
      });
      reposHTML += '</div>';

      root.innerHTML = `
      <div class="sec-header">
        <div class="sec-num">05</div>
        <div class="sec-title">// GITHUB ACTIVITY</div>
        <div class="sec-line"></div>
      </div>
      <div class="profile-row">
        <img class="avatar" src="${userData.avatar_url}" alt="${userData.login}">
        <div class="profile-info">
          <div class="handle">@${userData.login}</div>
          <h2>${userData.name || userData.login}</h2>
          <p>${userData.bio || 'Backend Developer & Data Science Enthusiast'}</p>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-n">${userData.public_repos || 0}</div><div class="stat-l">REPOS</div></div>
        <div class="stat"><div class="stat-n">${userData.followers || 0}</div><div class="stat-l">FOLLOWERS</div></div>
        <div class="stat"><div class="stat-n">${userData.following || 0}</div><div class="stat-l">FOLLOWING</div></div>
        <div class="stat"><div class="stat-n">${cal.totalContributions}</div><div class="stat-l">THIS YEAR</div></div>
      </div>
      ${buildHeatmap(cal, currentYear)}
      <div class="sec-header" style="margin-top:2rem">
        <div class="sec-num"></div>
        <div class="sec-title" style="font-size:.9rem">// RECENT REPOS</div>
        <div class="sec-line"></div>
      </div>
      ${reposHTML}`;

      attachTooltips();
    } catch (e) {
      root.innerHTML += '<div class="error-msg">Could not load GitHub data. Token may have expired.</div>';
    }
  }

  init();
</script>
